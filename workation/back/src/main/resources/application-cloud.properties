spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

app.seed.enabled=false
app.public-base-url=${APP_PUBLIC_BASE_URL:https://api.sandykey.shop}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://sandykey.shop}

management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}

kakao.rest-api-key=${KAKAO_REST_API_KEY}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:https://sandykey.shop/oauth/callback/kakao}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
naver.client-id=${NAVER_CLIENT_ID}
naver.client-secret=${NAVER_CLIENT_SECRET}
naver.redirect-uri=${NAVER_REDIRECT_URI:https://sandykey.shop/oauth/callback/naver}
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI:https://sandykey.shop/oauth/callback/google}
