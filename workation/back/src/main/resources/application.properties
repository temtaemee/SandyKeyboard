server.port=${SERVER_PORT:8001}

spring.profiles.default=local
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties],optional:classpath:application-private.properties

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-part-count=100

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.kh.app=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_BIND:INFO}
logging.pattern.console=%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n

management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}

app.seed.enabled=false
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8001}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

toss.secret-key=${TOSS_SECRET_KEY:local-dev-toss-secret}

kakao.rest-api-key=${KAKAO_REST_API_KEY:${VITE_KAKAO_REST_API_KEY:}}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/callback/kakao}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
kakao.client-secret-enabled=${KAKAO_CLIENT_SECRET_ENABLED:false}
naver.client-id=${NAVER_CLIENT_ID:${VITE_NAVER_CLIENT_ID:}}
naver.client-secret=${NAVER_CLIENT_SECRET:}
naver.redirect-uri=${NAVER_REDIRECT_URI:http://localhost:5173/oauth/callback/naver}
google.client-id=${GOOGLE_CLIENT_ID:${VITE_GOOGLE_CLIENT_ID:}}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/oauth/callback/google}

jwt.secret=${JWT_SECRET:local-dev-jwt-secret-must-be-over-32-characters}
jwt.expiration=${JWT_EXPIRATION:360000000}

cloud.aws.s3.bucket=${AWS_S3_BUCKET:finalproject-s3-bucket-243050855199-ap-northeast-2-an}
cloud.aws.region=${AWS_REGION:ap-northeast-2}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
cloud.aws.s3.base-url=${AWS_S3_BASE_URL:https://finalproject-s3-bucket-243050855199-ap-northeast-2-an.s3.ap-northeast-2.amazonaws.com}
