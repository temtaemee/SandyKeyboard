spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/code_hit}
spring.datasource.username=${LOCAL_DB_USERNAME:pandacode}
spring.datasource.password=${LOCAL_DB_PASSWORD:postgreskh}

spring.jpa.hibernate.ddl-auto=${LOCAL_DDL_AUTO:update}

app.seed.enabled=${LOCAL_SEED_ENABLED:true}
app.public-base-url=${LOCAL_PUBLIC_BASE_URL:http://localhost:8001}

kakao.rest-api-key=${LOCAL_KAKAO_REST_API_KEY:${KAKAO_REST_API_KEY:${VITE_KAKAO_REST_API_KEY:}}}
kakao.redirect-uri=${LOCAL_KAKAO_REDIRECT_URI:http://localhost:5173/oauth/callback/kakao}
kakao.client-secret=${LOCAL_KAKAO_CLIENT_SECRET:}
kakao.client-secret-enabled=${LOCAL_KAKAO_CLIENT_SECRET_ENABLED:${KAKAO_CLIENT_SECRET_ENABLED:false}}
naver.client-id=${LOCAL_NAVER_CLIENT_ID:${NAVER_CLIENT_ID:${VITE_NAVER_CLIENT_ID:}}}
naver.client-secret=${LOCAL_NAVER_CLIENT_SECRET:${NAVER_CLIENT_SECRET:}}
naver.redirect-uri=${LOCAL_NAVER_REDIRECT_URI:http://localhost:5173/oauth/callback/naver}
google.client-id=${LOCAL_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID:${VITE_GOOGLE_CLIENT_ID:}}}
google.client-secret=${LOCAL_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:}}
google.redirect-uri=${LOCAL_GOOGLE_REDIRECT_URI:http://localhost:5173/oauth/callback/google}
