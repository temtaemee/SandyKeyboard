name: Frontend CI/CD to S3 & CloudFront

on:
  push:
    branches: [ "main" ]
    paths:
      - 'workation/front/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: Node.js 환경 설정
      uses: actions/setup-node@v3
      with:
        node-version: '18' # 프로젝트 버전에 맞게 수정

    - name: 패키지 설치 및 빌드
      run: |
        cd workation/front
        npm install
        npm run build

    - name: AWS 자격 증명 설정
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: 빌드 결과물을 S3에 동기화(업로드)
      # React는 build 폴더, Vite는 dist 폴더를 주로 사용합니다. (경로 확인 필요)
      run: aws s3 sync ./workation/frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

    - name: CloudFront 캐시 무효화 (업데이트 즉시 반영)
      run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
