name: Backend CI/CD to EC2

on:
  push:
    branches: [ "main" ]
    # 백엔드 코드가 변경되었을 때만 실행되도록 경로 지정 (폴더 구조에 맞게 수정)
    paths:
      - 'backend/**' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: JDK 17 설정 (버전은 프로젝트에 맞게 수정)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle 권한 부여
      run: chmod +x ./backend/gradlew
      
    - name: Spring Boot 빌드 (bootJar)
      run: cd backend && ./gradlew bootJar

    - name: 빌드된 jar 파일을 EC2로 전송
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        source: "backend/build/libs/*.jar"
        target: "/home/ubuntu/deploy/"
        strip_components: 3 # 폴더 경로를 잘라내고 파일만 복사

    - name: EC2에 접속하여 기존 서버 종료 및 새 서버 실행
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          # 1. 새 파일 덮어쓰기
          cp /home/ubuntu/deploy/*.jar /home/ubuntu/app-0.0.1-SNAPSHOT.jar
          
          # 2. 실행 중인 자바 프로세스 찾아서 종료
          CURRENT_PID=$(pgrep -f "java -jar app-0.0.1-SNAPSHOT.jar")
          if [ -z "$CURRENT_PID" ]; then
            echo "현재 실행 중인 애플리케이션이 없습니다."
          else
            echo "실행 중인 애플리케이션 종료: $CURRENT_PID"
            kill -9 $CURRENT_PID
            sleep 3
          fi
          
          # 3. 백그라운드 재실행
          nohup java -jar /home/ubuntu/app-0.0.1-SNAPSHOT.jar > /home/ubuntu/nohup.out 2>&1 &
