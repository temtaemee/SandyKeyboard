name: Backend Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/backend-deploy.yml"
      - "workation/back/**"

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build boot jar
        working-directory: workation/back
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: workation/back
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$IMAGE:$SHA_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$SHA_TAG"
          docker push "$IMAGE:latest"

      - name: Validate deployment configuration
        env:
          DB_URL: ${{ secrets.DB_URL || vars.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          missing=0
          for name in DB_URL DB_USERNAME DB_PASSWORD JWT_SECRET DOCKERHUB_USERNAME EC2_HOST EC2_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured in GitHub Actions Secrets/Variables."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to EC2 with health check
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard:${{ github.sha }}
          DB_URL: ${{ secrets.DB_URL || vars.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION || '360000000' }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ vars.KAKAO_REDIRECT_URI || 'https://sandykey.shop/oauth/callback/kakao' }}
          NAVER_REDIRECT_URI: ${{ vars.NAVER_REDIRECT_URI || 'https://sandykey.shop/oauth/callback/naver' }}
          GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI || 'https://sandykey.shop/oauth/callback/google' }}
          APP_PUBLIC_BASE_URL: ${{ vars.APP_PUBLIC_BASE_URL || 'https://api.sandykey.shop' }}
          APP_CORS_ALLOWED_ORIGINS: ${{ vars.APP_CORS_ALLOWED_ORIGINS || 'https://sandykey.shop' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET || 'finalproject-s3-bucket-243050855199-ap-northeast-2-an' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BASE_URL: ${{ vars.AWS_S3_BASE_URL || 'https://finalproject-s3-bucket-243050855199-ap-northeast-2-an.s3.ap-northeast-2.amazonaws.com' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: IMAGE,DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,JWT_EXPIRATION,TOSS_SECRET_KEY,MAIL_USERNAME,MAIL_PASSWORD,KAKAO_REST_API_KEY,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,NAVER_REDIRECT_URI,GOOGLE_REDIRECT_URI,APP_PUBLIC_BASE_URL,APP_CORS_ALLOWED_ORIGINS,AWS_S3_BUCKET,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_S3_BASE_URL
          script: |
            set -euo pipefail

            cat > /tmp/sandykeyboard.env <<EOF
            SPRING_PROFILES_ACTIVE=cloud
            DB_URL=$DB_URL
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRATION=$JWT_EXPIRATION
            TOSS_SECRET_KEY=$TOSS_SECRET_KEY
            MAIL_USERNAME=$MAIL_USERNAME
            MAIL_PASSWORD=$MAIL_PASSWORD
            KAKAO_REST_API_KEY=$KAKAO_REST_API_KEY
            KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
            KAKAO_REDIRECT_URI=$KAKAO_REDIRECT_URI
            NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
            GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI
            APP_PUBLIC_BASE_URL=$APP_PUBLIC_BASE_URL
            APP_CORS_ALLOWED_ORIGINS=$APP_CORS_ALLOWED_ORIGINS
            AWS_S3_BUCKET=$AWS_S3_BUCKET
            AWS_REGION=$AWS_REGION
            AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            AWS_S3_BASE_URL=$AWS_S3_BASE_URL
            EOF

            sudo docker pull "$IMAGE"
            sudo docker rm -f sandykeyboard-candidate || true
            sudo docker run -d \
              --name sandykeyboard-candidate \
              --env-file /tmp/sandykeyboard.env \
              -p 8002:8001 \
              "$IMAGE"

            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8002/actuator/health >/tmp/sandykeyboard-health.json; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                sudo docker logs sandykeyboard-candidate
                sudo docker rm -f sandykeyboard-candidate
                exit 1
              fi
              sleep 2
            done

            sudo docker stop sandykeyboard || true
            sudo docker rm sandykeyboard || true
            sudo docker run -d \
              --name sandykeyboard \
              --restart unless-stopped \
              --env-file /tmp/sandykeyboard.env \
              -p 8001:8001 \
              "$IMAGE"

            sudo docker rm -f sandykeyboard-candidate
            sudo docker image prune -f
