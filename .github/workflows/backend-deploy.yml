name: Backend CI/CD to Docker Hub & EC2

on:
  push:
    branches: [ "main" ]
    # back 폴더 내부에 변경 사항이 있을 때만 실행됩니다.
    paths:
      - 'workation/back/**' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    # ▼ 여기에 프로퍼티 생성 스텝을 추가했습니다! ▼
    - name: application-private.properties 생성
      run: |
        # 1. 경로를 찾지 못하는 에러를 방지하기 위해 폴더를 먼저 생성합니다.
        mkdir -p ./workation/back/src/main/resources
        
        # 2. 줄바꿈과 특수문자 깨짐 없이 안전하게 파일로 저장합니다.
        cat <<EOF > ./workation/back/src/main/resources/application-private.properties
        ${{ vars.APPLICATION_PROPERTIES }}
        EOF
    # ▲ 여기까지 ▲

    - name: JDK 21 설정
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 권한 부여 및 빌드 (bootJar)
      run: |
        cd workation/back
        chmod +x ./gradlew
        ./gradlew bootJar

    - name: Docker Hub 로그인
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker 이미지 빌드 및 허브로 푸시
      run: |
        cd workation/back
        # sandykeyboard 라는 이름으로 이미지를 굽고 도커 허브에 업로드합니다.
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard:latest

    - name: EC2에 접속하여 기존 컨테이너 종료 및 새 컨테이너 실행
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          # 1. 방금 올린 최신 도커 이미지를 EC2로 다운로드합니다.
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard:latest
          
          # 2. 기존에 'sandykeyboard'라는 이름으로 돌고 있는 컨테이너를 정지하고 삭제합니다.
          sudo docker stop sandykeyboard || true
          sudo docker rm sandykeyboard || true
          
          # 3. 공간 확보를 위해 사용하지 않는 이전 이미지를 청소합니다.
          sudo docker image prune -f
          
          # 4. 새 컨테이너를 'sandykeyboard'라는 이름으로 백그라운드에서 실행합니다.
          sudo docker run -d --name sandykeyboard -p 8001:8001 ${{ secrets.DOCKERHUB_USERNAME }}/sandykeyboard:latest
