name: Seed RDS Dummy Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RESET_RDS_AND_SEED to truncate production RDS and load dummy data"
        required: true
        type: string

concurrency:
  group: seed-rds-dummy
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "RESET_RDS_AND_SEED" ]; then
            echo "::error::Confirmation text did not match."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Reset RDS and load dummy data
        env:
          DB_URL: ${{ secrets.DB_URL || vars.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DB_URL:-}" ] || [ -z "${DB_USERNAME:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
            echo "::error::DB_URL, DB_USERNAME, or DB_PASSWORD is not configured."
            exit 1
          fi

          PSQL_URI="$(python3 -c "import os, sys; from urllib.parse import quote, urlparse, parse_qsl, urlencode; raw=os.environ['DB_URL']; raw=raw[5:] if raw.startswith('jdbc:') else raw; p=urlparse(raw); q=dict(parse_qsl(p.query, keep_blank_values=True)); q.setdefault('sslmode','require'); host=p.hostname; db=p.path.lstrip('/'); sys.exit('Invalid DB_URL') if not host or not db else None; print('postgresql://{}:{}@{}:{}/{}?{}'.format(quote(os.environ['DB_USERNAME'], safe=''), quote(os.environ['DB_PASSWORD'], safe=''), host, p.port or 5432, db, urlencode(q)))")"

          echo "Truncating public schema tables..."
          psql "$PSQL_URI" -v ON_ERROR_STOP=1 -c "DO \$\$ DECLARE table_list text; BEGIN SELECT string_agg(format('%I.%I', schemaname, tablename), ', ') INTO table_list FROM pg_tables WHERE schemaname = 'public'; IF table_list IS NOT NULL THEN EXECUTE 'TRUNCATE TABLE ' || table_list || ' RESTART IDENTITY CASCADE'; END IF; END \$\$;"

          echo "Loading dummy data..."
          psql "$PSQL_URI" -v ON_ERROR_STOP=1 -f workation/back/dev-seed/test-open-dummy-data.sql

      - name: Verify seeded login rows
        env:
          DB_URL: ${{ secrets.DB_URL || vars.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -euo pipefail

          PSQL_URI="$(python3 -c "import os; from urllib.parse import quote, urlparse, parse_qsl, urlencode; raw=os.environ['DB_URL']; raw=raw[5:] if raw.startswith('jdbc:') else raw; p=urlparse(raw); q=dict(parse_qsl(p.query, keep_blank_values=True)); q.setdefault('sslmode','require'); print('postgresql://{}:{}@{}:{}/{}?{}'.format(quote(os.environ['DB_USERNAME'], safe=''), quote(os.environ['DB_PASSWORD'], safe=''), p.hostname, p.port or 5432, p.path.lstrip('/'), urlencode(q)))")"

          psql "$PSQL_URI" -v ON_ERROR_STOP=1 -c "select username from member where username in ('admin', 'user0001', 'seller-seoul') order by username;"
